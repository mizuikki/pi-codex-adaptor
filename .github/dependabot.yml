version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      project-tooling:
        patterns:
          - "@biomejs/*"
          - "@types/*"
          - typescript
      pi-packages:
        patterns:
          - "@earendil-works/*"
    ignore:
      # Keep development types on the pinned Node.js 24 line from fixtures/toolchain.json.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@openai/codex"
      - dependency-name: "@openai/codex-sdk"
  - package-ecosystem: cargo
    directory: /native
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Action SHA pins are validated against fixtures/toolchain.json. Dependabot PRs that
    # only touch workflows still need a coordinated fixture update before merge.
