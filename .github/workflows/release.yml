name: Release

on:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      source_commit:
        description: Exact repository commit to recover
        required: true
        type: string
      version:
        description: Existing repository version to recover
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect release commit
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    outputs:
      release: ${{ steps.verify.outputs.release }}
      already_published: ${{ steps.verify.outputs.alreadyPublished }}
      needs_finalize: ${{ steps.verify.outputs.needsFinalize }}
      prerelease: ${{ steps.verify.outputs.prerelease }}
      npm_dist_tag: ${{ steps.verify.outputs.npmDistTag }}
      publication_action: ${{ steps.verify.outputs.publicationAction }}
      source_commit: ${{ steps.verify.outputs.sourceCommit }}
      version: ${{ steps.verify.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_commit || github.sha }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
          no-cache: true
      - name: Restore an existing release bundle for complete-state verification
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(node -p 'require("./package.json").version')"
          source_commit="$(git rev-parse HEAD)"
          artifact_name="pi-codex-adaptor-${version}-${source_commit}"
          mkdir -p dist/release tmp/release-recovery
          mapfile -t run_ids < <(
            gh run list \
              --workflow release.yml \
              --commit "${source_commit}" \
              --limit 100 \
              --json databaseId,conclusion \
              --jq '.[] | select(.conclusion != null and .conclusion != "") | .databaseId'
          )
          for run_id in "${run_ids[@]}"; do
            candidate="tmp/release-recovery/${run_id}"
            rm -rf "${candidate}"
            if gh run download "${run_id}" --name "${artifact_name}" --dir "${candidate}" 2>/dev/null && \
              [[ -f "${candidate}/release-manifest.json" ]]; then
              cp -R "${candidate}/." dist/release/
              break
            fi
          done
      - name: Verify release state
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_SOURCE_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.source_commit || '' }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          RELEASE_BOOTSTRAP_VERSION: ${{ vars.RELEASE_BOOTSTRAP_VERSION }}
        run: >-
          bun scripts/verify-release.ts
          --github-output
          --manifest dist/release/release-manifest.json

  native:
    name: Build release native artifacts
    needs: detect
    if: >-
      needs.detect.outputs.release == 'true' &&
      needs.detect.outputs.already_published != 'true' &&
      needs.detect.outputs.publication_action == 'publish'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/native.yml

  publish:
    name: Publish exact npm tarball
    needs:
      - detect
      - native
    if: >-
      needs.detect.outputs.release == 'true' &&
      needs.detect.outputs.already_published != 'true' &&
      needs.detect.outputs.publication_action == 'publish'
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write
      attestations: read
    outputs:
      published: ${{ steps.publish.outputs.published }}
    steps:
      - name: Check out exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.detect.outputs.source_commit }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
          no-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Set up npm
        run: npm install --global npm@12.0.1
      - name: Verify Trusted Publishing prerequisites
        run: |
          test "$(node --version)" = "v24.18.0"
          test "$(npm --version)" = "12.0.1"
      - name: Install dependencies
        run: bun ci
      - name: Download current release native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: codex-bridge-*-${{ needs.detect.outputs.source_commit }}-codex-78ad6e6bfd1d3b6a
          path: native/artifacts
          merge-multiple: true
      - name: Verify native artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p tmp/release-attestation
          mapfile -t subjects < <(find native/artifacts -type f ! -name 'native-artifact.json' | sort)
          if [[ "${#subjects[@]}" -eq 0 ]]; then
            echo "No native executables found for attestation verification" >&2
            exit 1
          fi
          verification_file="tmp/release-attestation/attestation-verification.json"
          results_directory="tmp/release-attestation/results"
          mkdir -p "${results_directory}"
          for index in "${!subjects[@]}"; do
            subject="${subjects[$index]}"
            echo "Verifying attestation for ${subject}"
            gh attestation verify \
              "${subject}" \
              --repo "${GITHUB_REPOSITORY}" \
              --format json > "${results_directory}/${index}.json"
          done
          jq -e -s 'if all(.[]; type == "array") then add | if length > 0 then . else error("attestation result is empty") end else error("attestation result is not an array") end' \
            "${results_directory}"/*.json > "${verification_file}"
      - name: Assemble the exact tarball
        env:
          NPM_DIST_TAG: ${{ needs.detect.outputs.npm_dist_tag }}
        shell: bash
        run: |
          bun scripts/publish-package.ts \
            --native-artifacts-dir native/artifacts \
            --prepare-only
          cp tmp/release-attestation/attestation-verification.json dist/release/attestation-verification.json
          echo "Selected npm dist-tag: ${NPM_DIST_TAG}"
      - name: Upload exact tarball and release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pi-codex-adaptor-${{ needs.detect.outputs.version }}-${{ needs.detect.outputs.source_commit }}
          path: dist/release
          if-no-files-found: error
          retention-days: 30
      - name: Publish the saved exact tarball
        id: publish
        env:
          NPM_TRUSTED_PUBLISHING_READY: ${{ vars.NPM_TRUSTED_PUBLISHING_READY }}
          RELEASE_VERSION: ${{ needs.detect.outputs.version }}
        shell: bash
        run: |
          if [[ "${NPM_TRUSTED_PUBLISHING_READY}" != "true" ]]; then
            if [[ "${RELEASE_VERSION}" != "0.1.0-rc.0" ]]; then
              echo "Trusted Publishing is not configured for this release" >&2
              exit 1
            fi
            echo "published=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          bun scripts/publish-package.ts --publish-prepared
          echo "published=true" >> "${GITHUB_OUTPUT}"

  finalize:
    name: Create tag and GitHub release
    needs:
      - detect
      - publish
    if: >-
      always() &&
      needs.detect.result == 'success' &&
      (
        (
          needs.detect.outputs.release == 'true' &&
          needs.detect.outputs.needs_finalize == 'true'
        ) ||
        needs.detect.outputs.publication_action == 'complete'
      ) &&
      (
        needs.publish.result == 'success' ||
        (
          needs.publish.result == 'skipped' &&
          needs.detect.outputs.already_published == 'true'
        )
      ) &&
      (
        needs.publish.outputs.published == 'true' ||
        needs.detect.outputs.already_published == 'true'
      )
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    steps:
      - name: Check out exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.detect.outputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
          no-cache: true
      - name: Restore release artifacts for recovery
        if: needs.detect.outputs.already_published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: ${{ needs.detect.outputs.source_commit }}
          VERSION: ${{ needs.detect.outputs.version }}
        shell: bash
        run: |
          mkdir -p dist/release
          artifact_name="pi-codex-adaptor-${VERSION}-${SOURCE_COMMIT}"
          if [[ ! -f dist/release/release-manifest.json ]]; then
            mkdir -p tmp/release-recovery
            mapfile -t run_ids < <(
              gh run list \
                --workflow release.yml \
                --commit "${SOURCE_COMMIT}" \
                --limit 100 \
                --json databaseId,conclusion \
                --jq '.[] | select(.conclusion != null and .conclusion != "") | .databaseId'
            )
            found="false"
            for run_id in "${run_ids[@]}"; do
              candidate="tmp/release-recovery/${run_id}"
              rm -rf "${candidate}"
              if gh run download "${run_id}" --name "${artifact_name}" --dir "${candidate}" 2>/dev/null && \
                [[ -f "${candidate}/release-manifest.json" ]]; then
                cp -R "${candidate}/." dist/release/
                found="true"
                break
              fi
            done
            if [[ "${found}" != "true" ]]; then
              echo "Unable to locate a prior release workflow run with artifact ${artifact_name}" >&2
              exit 1
            fi
          fi
          test -f dist/release/release-manifest.json
      - name: Download current-run release artifacts
        if: needs.detect.outputs.already_published != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pi-codex-adaptor-${{ needs.detect.outputs.version }}-${{ needs.detect.outputs.source_commit }}
          path: dist/release
      - name: Verify published package integrity before finalize
        if: needs.detect.outputs.already_published == 'true'
        env:
          RELEASE_GIT_TAG_EXISTS: "false"
          RELEASE_GITHUB_RELEASE_EXISTS: "false"
        run: >-
          bun scripts/verify-release.ts
          --verify-published-integrity
          --manifest dist/release/release-manifest.json
      - name: Create release tag and notes on the exact source commit
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.detect.outputs.prerelease }}
          SOURCE_COMMIT: ${{ needs.detect.outputs.source_commit }}
          VERSION: ${{ needs.detect.outputs.version }}
        shell: bash
        run: |
          if [[ ! "${SOURCE_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Exact release source commit is required" >&2
            exit 1
          fi
          if ! git cat-file -e "${SOURCE_COMMIT}^{commit}"; then
            echo "Release source commit ${SOURCE_COMMIT} is not present in this repository" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            remote_target="$(
              git ls-remote --tags origin "refs/tags/v${VERSION}" "refs/tags/v${VERSION}^{}" |
                awk '$2 ~ /\^\{\}$/ { peeled=$1 } $2 !~ /\^\{\}$/ { direct=$1 } END { print peeled ? peeled : direct }'
            )"
            if [[ "${remote_target}" != "${SOURCE_COMMIT}" ]]; then
              echo "Existing tag v${VERSION} points at ${remote_target}, expected ${SOURCE_COMMIT}" >&2
              exit 1
            fi
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/v${VERSION}" \
              -f sha="${SOURCE_COMMIT}"
          fi

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            release_json="$(gh release view "v${VERSION}" --json tagName,isPrerelease)"
            release_tag="$(jq -r '.tagName' <<< "${release_json}")"
            release_prerelease="$(jq -r '.isPrerelease' <<< "${release_json}")"
            if [[ "${release_tag}" != "v${VERSION}" ]]; then
              echo "Existing GitHub Release tag ${release_tag} does not match v${VERSION}" >&2
              exit 1
            fi
            if [[ "${release_prerelease}" != "${PRERELEASE}" ]]; then
              echo "Existing GitHub Release channel does not match the expected prerelease state" >&2
              exit 1
            fi
          else
            create_args=("v${VERSION}" --target "${SOURCE_COMMIT}" --generate-notes --title "v${VERSION}")
            if [[ "${PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          fi

          if [[ -d dist/release ]]; then
            gh release upload "v${VERSION}" dist/release/* --clobber
          fi
