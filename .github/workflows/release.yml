name: Release

on:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      source_commit:
        description: Exact repository commit to recover
        required: true
        type: string
      version:
        description: Existing repository version to recover
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect release commit
    runs-on: ubuntu-24.04
    outputs:
      release: ${{ steps.verify.outputs.release }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Verify release state
        id: verify
        run: bun scripts/verify-release.ts --github-output

  native:
    name: Build release native artifacts
    needs: detect
    if: needs.detect.outputs.release == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/native.yml

  publish:
    name: Publish exact npm tarball
    needs:
      - detect
      - native
    if: needs.detect.outputs.release == 'true'
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Stop until release implementation is complete
        run: |
          echo "The 0.0.0 skeleton cannot publish releases."
          exit 1
