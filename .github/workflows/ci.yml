name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Set up npm
        run: npm install --global npm@12.0.1
      - name: Install Rust toolchain prerequisites
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "1.95.0" --profile minimal --component clippy --component rustfmt --component rust-src
          rustup target add --toolchain "1.95.0" "${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *-linux-musl ]]; then
            sudo apt-get update
            sudo apt-get install --yes musl-tools
          fi
      - name: Install dependencies
        run: bun ci
      - name: Run checks
        run: bun run check
      - name: Verify pinned upstream source
        if: runner.os == 'Linux'
        run: bun run check:upstream-source

  pull-request-contract:
    name: Pull request contract
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Verify title and release label
        env:
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bun scripts/verify-pr.ts

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Codex 0.144.3 pins Rama alpha and Hickory 0.25.2 on Rust 1.95. DNSSEC is
          # disabled, and DNS name encoding is bounded by the protocol length limit.
          # Remove both exceptions when the pinned Codex baseline supports Hickory 0.26.1.
          allow-ghsas: GHSA-3v94-mw7p-v465,GHSA-q2qq-hmj6-3wpp

  codeql:
    name: CodeQL
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4 / bundle 2.26.0
        with:
          languages: javascript-typescript
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4 / bundle 2.26.0
