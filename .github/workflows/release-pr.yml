name: Release Please

on:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: Update release pull request
    if: vars.RELEASE_AUTOMATION_READY == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
      - name: Verify the current version is finalized
        shell: bash
        run: |
          version="$(node -p 'require("./package.json").version')"
          if [[ "${version}" == "0.0.0" ]]; then
            exit 0
          fi
          if ! git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null; then
            echo "Version ${version} is not tagged yet; refusing to open the next Release Please PR" >&2
            exit 1
          fi
      - name: Validate release-as lifecycle
        env:
          RELEASE_BOOTSTRAP_VERSION: ${{ vars.RELEASE_BOOTSTRAP_VERSION }}
        shell: bash
        run: |
          bootstrap="${RELEASE_BOOTSTRAP_VERSION:-}"
          if [[ -z "${bootstrap}" ]]; then
            exit 0
          fi
          if [[ "${GITHUB_REF_NAME}" == release/* ]]; then
            expected="0.1.0-rc.0"
          else
            expected="0.1.0"
          fi
          if [[ "${bootstrap}" != "${expected}" ]]; then
            echo "Unsupported release-as bootstrap version for ${GITHUB_REF_NAME}: ${bootstrap} (expected ${expected})" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${bootstrap}" >/dev/null 2>&1; then
            echo "release-as override ${bootstrap} must be cleared after that version is tagged" >&2
            exit 1
          fi
      - name: Create short-lived GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Select release configuration
        id: config
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == release/* ]]; then
            echo "path=.github/release-please/rc.json" >> "${GITHUB_OUTPUT}"
          else
            echo "path=.github/release-please/stable.json" >> "${GITHUB_OUTPUT}"
          fi
      - name: Create or update release pull request
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ steps.config.outputs.path }}
          manifest-file: .release-please-manifest.json
          release-as: ${{ vars.RELEASE_BOOTSTRAP_VERSION }}
