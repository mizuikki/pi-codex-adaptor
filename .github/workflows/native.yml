name: Native artifacts

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    name: Native bridge (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            executable: codex-bridge
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            executable: codex-bridge
          - os: macos-15-intel
            target: x86_64-apple-darwin
            executable: codex-bridge
          - os: macos-15
            target: aarch64-apple-darwin
            executable: codex-bridge
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            executable: codex-bridge.exe
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install target toolchain prerequisites
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "1.95.0" --profile minimal --component clippy --component rustfmt --component rust-src
          rustup target add --toolchain "1.95.0" "${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *-linux-musl ]]; then
            sudo apt-get update
            sudo apt-get install --yes musl-tools
          fi
      - name: Install dependencies
        run: bun ci
      - name: Test native bridge
        run: cargo test --locked --manifest-path native/Cargo.toml --target ${{ matrix.target }}
      - name: Build native bridge
        env:
          PI_CODEX_ADAPTOR_SOURCE_COMMIT: ${{ github.sha }}
        run: cargo build --locked --release --manifest-path native/Cargo.toml --target ${{ matrix.target }}
      - name: Verify bridge identity
        run: >-
          bun scripts/verify-bridge-integration.ts
          --target ${{ matrix.target }}
          --executable native/target/${{ matrix.target }}/release/${{ matrix.executable }}
          --source-commit ${{ github.sha }}
      - name: Assemble native artifact
        run: >-
          bun scripts/assemble-native-artifact.ts
          --target ${{ matrix.target }}
          --executable native/target/${{ matrix.target }}/release/${{ matrix.executable }}
          --source-commit ${{ github.sha }}
      - name: Attest native executable
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: native/artifacts/${{ matrix.target }}/*
      - name: Upload native executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-bridge-${{ matrix.target }}-${{ github.sha }}-codex-78ad6e6bfd1d3b6a
          path: native/artifacts
          if-no-files-found: error
          retention-days: 30
